x-app-env: &app-env
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: check_domain
  DB_USERNAME: laravel
  DB_PASSWORD: laravel
  QUEUE_CONNECTION: database

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    environment: *app-env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: check_domain
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    command: php artisan queue:work database --sleep=3 --tries=2 --timeout=120
    environment: *app-env
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    command: php artisan schedule:work
    environment: *app-env
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # Тримає контейнер живим для `docker compose exec node npm …` (без цього `up` одразу Exited 0).
  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: ["tail", "-f", "/dev/null"]

  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      VITE_PORT: "5173"
      # macOS / Windows: bind-mount часто ламає inotify — polling стабільніший для `npm run dev`
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    profiles:
      - dev
    depends_on:
      - app

volumes:
  mysql_data:
