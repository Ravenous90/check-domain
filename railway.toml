# Railway: https://railway.app — підключи репозиторій, додай MySQL, задай змінні з docs/DEPLOY.md
# Другий сервіс (воркер): той самий Docker image, Start Command: sh scripts/railway-worker.sh

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "php artisan migrate --force --no-interaction"
restartPolicyType = "ON_FAILURE"
# Не задавай healthcheck тут: той самий railway.toml читають веб і воркер — воркер без HTTP, /up йому ламає деплой.
# На веб-сервісі в Railway: Settings → Healthcheck Path = /up (тільки для сервісу з php artisan serve).
